<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Java · DSA · LeetCode — Interactive eBook</title>

  <link rel="icon" type="image/svg+xml" href="assets/icons/java-logo.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/sidebar.css" />
  <link rel="stylesheet" href="css/lesson.css" />
  <link rel="stylesheet" href="css/code.css" />
  <link rel="stylesheet" href="css/practice.css" />
  <link rel="stylesheet" href="css/leetcode.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <button type="button" class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle menu">
    <i data-lucide="menu" class="icon"></i>
  </button>
  <button type="button" class="sidebar-open-btn" id="sidebarOpenBtn" aria-label="Open sidebar">
    <i data-lucide="panel-left" class="icon"></i>
  </button>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="app-shell" id="appShell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <img src="assets/icons/java-logo.svg" alt="Java" class="logo-mark" />
        <div class="brand-text">
          <span class="brand-title">Java · DSA · LeetCode</span>
          <span class="brand-sub">Interactive eBook</span>
        </div>
        <button type="button" class="sidebar-collapse-btn" id="sidebarCollapseBtn" aria-label="Collapse sidebar">
          <i data-lucide="panel-left-close" class="icon"></i>
        </button>
      </div>

      <div class="sidebar-progress">
        <div class="progress-label">
          <span>Overall Progress</span>
          <span id="progressLabelValue">0%</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-label lc-progress-label">
          <span>LeetCode Solved</span>
          <span id="lcProgressLabelValue">0/0</span>
        </div>
      </div>

      <div class="sidebar-search">
        <input type="text" id="sidebarSearchInput" placeholder="Search topics..." aria-label="Search topics" />
      </div>

      <nav class="sidebar-nav" id="sidebarNav" aria-label="Course roadmap"></nav>

      <div class="sidebar-footer">
        <button type="button" class="btn" id="themeToggleBtn"><i data-lucide="moon" class="icon"></i> Theme</button>
      </div>
    </aside>

    <main class="main-scroll">
      <div class="main-content" id="lessonContent"></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-clike.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-java.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <script type="module" src="js/app.js"></script>
</body>
</html>
